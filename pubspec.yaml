name: bloom_mama
description: A premium autonomous pregnancy companion.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Local Database (Offline-first core)
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.5

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.2.3
  glass_kit: ^3.0.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  share_plus: ^12.0.1
  csv: ^6.0.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.2
  cupertino_icons: ^1.0.8
  pdf: ^3.11.3
  printing: ^5.14.2
  wakelock_plus: ^1.4.0
  path: ^1.9.1
  purchases_flutter: ^9.10.4
  purchases_ui_flutter: ^9.10.4
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  isar_generator: ^3.1.0

# ВНИМАНИЕ: Соблюдай отступы ниже строго!
flutter:
  uses-material-design: true
  generate: true


  assets:
    - assets/shaders/
    - assets/data/
    - assets/names.csv
    - assets/images/fruits/
    - assets/images/realistic/

  shaders:
    - assets/shaders/organic_cell.frag